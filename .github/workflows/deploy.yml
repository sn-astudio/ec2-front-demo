name: Deploy to EC2

on:
  push:
    branches: [ "main" ] # 메인 브랜치에 푸시될 때 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Docker 빌드 및 Docker Hub 푸시
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-test:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-test:latest

      # 2. EC2 접속 및 배포 명령어 실행
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 기존 컨테이너 중지 및 삭제 (실패해도 계속 진행)
            docker stop my-react-app || true
            docker rm my-react-app || true
            # 최신 이미지 풀링
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-test:latest
            # 새 컨테이너 실행
            docker run -d -p 80:80 --name my-react-app ${{ secrets.DOCKER_USERNAME }}/frontend-test:latest
            # 안 쓰는 이미지 정리
            docker image prune -f